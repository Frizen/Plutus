name: ExpenseCapture
options:
  bundleIdPrefix: com.expensecapture
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO

configs:
  Debug: debug
  Release: release

targets:
  ExpenseCapture:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpenseCapture
        excludes:
          - "**/*.plist"
    resources:
      - path: ExpenseCapture/Info.plist
    info:
      path: ExpenseCapture/Info.plist
      properties:
        CFBundleDisplayName: Plutus
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            open.bigmodel.cn:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            open.feishu.cn:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
        NSUserActivityTypes:
          - $(PRODUCT_BUNDLE_IDENTIFIER).AnalyzeExpenseIntent
        UIBackgroundModes:
          - processing
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.expensecapture.app
        INFOPLIST_FILE: ExpenseCapture/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    entitlements:
      path: ExpenseCapture/ExpenseCapture.entitlements

  ExpenseCaptureTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpenseCaptureTests
    dependencies:
      - target: ExpenseCapture
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.expensecapture.tests
        GENERATE_INFOPLIST_FILE: YES
